server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        same-site: ${APP_SESSION_COOKIE_SAME_SITE:Lax}
        secure: ${APP_SESSION_COOKIE_SECURE:false}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/writeloop?useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=Asia/Seoul&forceConnectionTimeZoneToSession=true}
    username: ${SPRING_DATASOURCE_USERNAME:writeloop}
    password: ${SPRING_DATASOURCE_PASSWORD:writeloop}
  jackson:
    time-zone: Asia/Seoul
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul

llm:
  feedback-provider: ${LLM_FEEDBACK_PROVIDER:gemini}
  coach-provider: ${LLM_COACH_PROVIDER:${LLM_FEEDBACK_PROVIDER:gemini}}

gemini:
  api-key: ${GEMINI_API_KEY:}
  feedback-model: ${GEMINI_FEEDBACK_MODEL:${GEMINI_MODEL:gemini-3-flash-preview}}
  feedback-thinking-budget: ${GEMINI_FEEDBACK_THINKING_BUDGET:16000}
  feedback-request-timeout-seconds: ${GEMINI_FEEDBACK_REQUEST_TIMEOUT_SECONDS:120}
  coach-model: ${GEMINI_COACH_MODEL:${GEMINI_MODEL:gemini-3.1-flash-lite-preview}}
  api-url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models}

openai:
  api-key: ${OPENAI_API_KEY:}
  feedback-model: ${OPENAI_FEEDBACK_MODEL:${OPENAI_MODEL:gpt-5-mini}}
  coach-model: ${OPENAI_COACH_MODEL:${OPENAI_FEEDBACK_MODEL:${OPENAI_MODEL:gpt-5-mini}}}
  coach-reasoning-effort: ${OPENAI_COACH_REASONING_EFFORT:${OPENAI_FEEDBACK_REASONING_EFFORT:}}
  coach-request-timeout-seconds: ${OPENAI_COACH_REQUEST_TIMEOUT_SECONDS:${OPENAI_FEEDBACK_REQUEST_TIMEOUT_SECONDS:120}}
  feedback-reasoning-effort: ${OPENAI_FEEDBACK_REASONING_EFFORT:}
  feedback-request-timeout-seconds: ${OPENAI_FEEDBACK_REQUEST_TIMEOUT_SECONDS:120}
  api-url: ${OPENAI_API_URL:https://api.openai.com/v1/responses}

app:
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://writeloop.localtest.me}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://writeloop.localtest.me}
  auth:
    remember-me-days: ${APP_AUTH_REMEMBER_ME_DAYS:30}
    token-secret: ${APP_AUTH_TOKEN_SECRET:writeloop-dev-token-secret-change-me}
    access-token-minutes: ${APP_AUTH_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${APP_AUTH_REFRESH_TOKEN_DAYS:30}
    mobile-social-code-minutes: ${APP_AUTH_MOBILE_SOCIAL_CODE_MINUTES:5}
    mobile-redirect-prefixes: ${APP_AUTH_MOBILE_REDIRECT_PREFIXES:writeloop://,exp://}
  admin:
    emails: ${APP_ADMIN_EMAILS:}
  mail:
    from: ${APP_MAIL_FROM:no-reply@writeloop.local}
    from-name: ${APP_MAIL_FROM_NAME:WriteLoop}
  drafts:
    ttl-days: ${APP_DRAFT_TTL_DAYS:7}
  coach-evaluation:
    scheduled-enabled: ${APP_COACH_EVALUATION_SCHEDULED_ENABLED:false}
    fixed-delay-ms: ${APP_COACH_EVALUATION_FIXED_DELAY_MS:900000}
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      authorization-uri: ${GOOGLE_AUTHORIZATION_URI:https://accounts.google.com/o/oauth2/v2/auth}
      token-uri: ${GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
      user-info-uri: ${GOOGLE_USER_INFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://api.localtest.me/api/auth/social/google/callback}
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      authorization-uri: ${KAKAO_AUTHORIZATION_URI:https://kauth.kakao.com/oauth/authorize}
      token-uri: ${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
      user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
      redirect-uri: ${KAKAO_REDIRECT_URI:http://api.localtest.me/api/auth/social/kakao/callback}
    naver:
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
      authorization-uri: ${NAVER_AUTHORIZATION_URI:https://nid.naver.com/oauth2.0/authorize}
      token-uri: ${NAVER_TOKEN_URI:https://nid.naver.com/oauth2.0/token}
      user-info-uri: ${NAVER_USER_INFO_URI:https://openapi.naver.com/v1/nid/me}
      redirect-uri: ${NAVER_REDIRECT_URI:http://api.localtest.me/api/auth/social/naver/callback}
