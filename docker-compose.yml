services:
  writeloop-redis:
    image: redis:7-alpine
    container_name: writeLoop-redis

  writeloop-backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: writeLoop-backend
    depends_on:
      - writeloop-redis
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://host.docker.internal:3306/writeloop?useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=Asia/Seoul&forceConnectionTimeZoneToSession=true}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-writeloop}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-writeloop}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-writeloop-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      TZ: Asia/Seoul
      LLM_FEEDBACK_PROVIDER: ${LLM_FEEDBACK_PROVIDER:-gemini}
      LLM_COACH_PROVIDER: ${LLM_COACH_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_FEEDBACK_MODEL: ${GEMINI_FEEDBACK_MODEL:-gemini-3-flash-preview}
      GEMINI_FEEDBACK_THINKING_BUDGET: ${GEMINI_FEEDBACK_THINKING_BUDGET:-16000}
      GEMINI_FEEDBACK_REQUEST_TIMEOUT_SECONDS: ${GEMINI_FEEDBACK_REQUEST_TIMEOUT_SECONDS:-120}
      GEMINI_COACH_MODEL: ${GEMINI_COACH_MODEL:-gemini-3.1-flash-lite-preview}
      GEMINI_API_URL: ${GEMINI_API_URL:-https://generativelanguage.googleapis.com/v1beta/models}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_FEEDBACK_MODEL: ${OPENAI_FEEDBACK_MODEL:-gpt-5-mini}
      OPENAI_COACH_MODEL: ${OPENAI_COACH_MODEL:-gpt-5-mini}
      OPENAI_FEEDBACK_REASONING_EFFORT: ${OPENAI_FEEDBACK_REASONING_EFFORT:-}
      OPENAI_FEEDBACK_REQUEST_TIMEOUT_SECONDS: ${OPENAI_FEEDBACK_REQUEST_TIMEOUT_SECONDS:-120}
      OPENAI_API_URL: ${OPENAI_API_URL:-https://api.openai.com/v1/responses}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://writeloop.localtest.me}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-http://writeloop.localtest.me}
      APP_AUTH_REMEMBER_ME_DAYS: ${APP_AUTH_REMEMBER_ME_DAYS:-30}
      APP_ADMIN_EMAILS: ${APP_ADMIN_EMAILS:-}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@writeloop.local}
      APP_DRAFT_TTL_DAYS: ${APP_DRAFT_TTL_DAYS:-7}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      NAVER_AUTHORIZATION_URI: ${NAVER_AUTHORIZATION_URI:-https://nid.naver.com/oauth2.0/authorize}
      NAVER_TOKEN_URI: ${NAVER_TOKEN_URI:-https://nid.naver.com/oauth2.0/token}
      NAVER_USER_INFO_URI: ${NAVER_USER_INFO_URI:-https://openapi.naver.com/v1/nid/me}
      NAVER_REDIRECT_URI: ${NAVER_REDIRECT_URI:-http://api.localtest.me/api/auth/social/naver/callback}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_AUTHORIZATION_URI: ${GOOGLE_AUTHORIZATION_URI:-https://accounts.google.com/o/oauth2/v2/auth}
      GOOGLE_TOKEN_URI: ${GOOGLE_TOKEN_URI:-https://oauth2.googleapis.com/token}
      GOOGLE_USER_INFO_URI: ${GOOGLE_USER_INFO_URI:-https://openidconnect.googleapis.com/v1/userinfo}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://api.localtest.me/api/auth/social/google/callback}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      KAKAO_AUTHORIZATION_URI: ${KAKAO_AUTHORIZATION_URI:-https://kauth.kakao.com/oauth/authorize}
      KAKAO_TOKEN_URI: ${KAKAO_TOKEN_URI:-https://kauth.kakao.com/oauth/token}
      KAKAO_USER_INFO_URI: ${KAKAO_USER_INFO_URI:-https://kapi.kakao.com/v2/user/me}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:-http://api.localtest.me/api/auth/social/kakao/callback}

  writeloop-frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api.localtest.me}
    container_name: writeLoop-frontend
    depends_on:
      - writeloop-backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api.localtest.me}

  writeloop-nginx:
    image: nginx:1.27-alpine
    container_name: writeLoop-nginx
    depends_on:
      - writeloop-frontend
      - writeloop-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./${NGINX_CONF_PATH:-infra/nginx/dev.conf}:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
