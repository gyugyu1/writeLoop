resolver 127.0.0.11 ipv6=off valid=30s;

server {
    listen 80;
    server_name api.writeloop.kr;

    return 301 https://$host$request_uri;
}

server {
    listen 80 default_server;
    server_name writeloop.kr app.writeloop.kr;

    return 301 https://writeloop.kr$request_uri;
}

server {
    listen 80;
    server_name www.writeloop.kr;

    return 301 https://writeloop.kr$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.writeloop.kr;

    ssl_certificate /etc/letsencrypt/live/writeloop.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/writeloop.kr/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        set $backend_upstream http://writeloop-backend:8080;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name writeloop.kr;

    ssl_certificate /etc/letsencrypt/live/writeloop.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/writeloop.kr/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        set $frontend_upstream http://writeloop-frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
