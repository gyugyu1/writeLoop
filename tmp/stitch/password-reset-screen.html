<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#F2994A",
              "background-light": "#f8f7f6",
              "background-dark": "#221810",
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #914d00 0%, #ffaf6d 100%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center p-6 sm:p-12">
<div class="max-w-md w-full space-y-8">
<!-- Header Section -->
<header class="text-center">
<div class="inline-block relative">
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface">
                        비밀번호 재설정
                    </h1>
</div>
</header>
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-[2rem] p-8 shadow-[0_20px_40px_rgba(48,51,48,0.06)] space-y-8">
<div class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface px-1">이메일 확인</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary/20 rounded-xl px-6 py-4 text-on-surface placeholder:text-outline-variant transition-all outline-none" placeholder="example@writeloop.com" type="email"/>
<div class="absolute inset-y-0 right-4 flex items-center text-outline-variant group-focus-within:text-primary">
<span class="material-symbols-outlined">mail</span>
</div>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-white font-headline font-bold text-lg py-5 rounded-lg active:scale-95 transition-all duration-200">이메일 확인</button>
</div>
<!-- Footer Link -->
<footer class="text-center">
<a class="text-on-surface-variant hover:text-primary text-sm font-medium flex items-center justify-center gap-2 transition-colors" href="#">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                    로그인 페이지로 돌아가기
                </a>
</footer>
</div>
</main>
<!-- Visual Accents -->
<div class="fixed top-[-100px] right-[-100px] w-80 h-80 bg-primary-container rounded-full opacity-10 blur-3xl -z-10"></div>
<div class="fixed bottom-[-50px] left-[-50px] w-64 h-64 bg-secondary-container rounded-full opacity-10 blur-3xl -z-10"></div>
</body></html>
